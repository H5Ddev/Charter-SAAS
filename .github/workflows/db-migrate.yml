# ─────────────────────────────────────────────────────────────────────────────
# AeroComm — Run Prisma Migrations
# .github/workflows/db-migrate.yml
#
# Applies pending migrations to the database using prisma migrate deploy.
# Safe to run on any environment — only runs committed migration files,
# never generates new ones.
#
# Triggered by: Manual workflow_dispatch ONLY
# ─────────────────────────────────────────────────────────────────────────────

name: "🔄 Run Database Migrations"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'What migration are you applying?'
        required: true
        type: string

jobs:
  migrate:
    name: Prisma Migrate Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Applying migrations..."
          echo "Reason: ${{ github.event.inputs.reason }}"
          npx prisma migrate deploy
          echo "✅ Migrations applied"

      - name: Summary
        run: |
          echo "## ✅ Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field   | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor**  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
