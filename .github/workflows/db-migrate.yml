# ─────────────────────────────────────────────────────────────────────────────
# AeroComm — Safe Schema Migration
# .github/workflows/db-migrate.yml
#
# Applies additive schema changes (new columns, new tables) to the live
# database WITHOUT dropping any data. Safe to run after deploying new
# Prisma schema fields.
#
# Triggered by: Manual workflow_dispatch ONLY
# ─────────────────────────────────────────────────────────────────────────────

name: "🔄 Apply Schema Changes (Safe)"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'What schema change are you applying?'
        required: true
        type: string

jobs:
  migrate:
    name: Apply Prisma Schema
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch DATABASE_URL from Key Vault
        id: kv
        run: |
          DB_URL=$(az keyvault secret show \
            --vault-name ${{ secrets.KEY_VAULT_NAME }} \
            --name "DATABASE-URL" \
            --query value -o tsv)
          echo "::add-mask::${DB_URL}"
          echo "database-url=${DB_URL}" >> "$GITHUB_OUTPUT"

      # Backfill null tenantId values BEFORE db push tightens them to NOT NULL.
      # Idempotent — safe to re-run on every migration.
      - name: Backfill null tenantId values (idempotent)
        working-directory: backend
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database-url }}
        run: npx ts-node --transpile-only scripts/backfill-tenantid-nulls.ts

      - name: Apply schema changes
        working-directory: backend
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database-url }}
        run: |
          echo "Applying schema changes..."
          echo "Reason: ${{ github.event.inputs.reason }}"
          npx prisma db push
          echo "✅ Schema applied — no data was dropped"

      - name: Summary
        run: |
          echo "## ✅ Schema Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field   | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor**  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
