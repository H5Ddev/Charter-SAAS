# ─────────────────────────────────────────────────────────────────────────────
# AeroComm — Database Reset Workflow (DESTRUCTIVE)
# .github/workflows/db-reset.yml
#
# ⚠️  WARNING: This drops ALL tables and reseed from scratch.
#     ALL production data will be permanently deleted.
#
# Triggered by: Manual workflow_dispatch ONLY
# Requires:     Typing "RESET" in the confirmation field
#
# Secrets required (same as deploy-prod.yml):
#   AZURE_CREDENTIALS   — Azure service principal JSON
#   KEY_VAULT_NAME      — Key Vault containing DATABASE-URL secret
# ─────────────────────────────────────────────────────────────────────────────

name: "⚠️ Database Reset (DESTRUCTIVE)"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET to confirm — this deletes ALL data permanently'
        required: true
        type: string
      reason:
        description: 'Why are you resetting the database?'
        required: true
        type: string

jobs:
  reset-database:
    name: Drop & Recreate Database
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Abort if confirmation missing
        if: github.event.inputs.confirm != 'RESET'
        run: |
          echo "❌ Confirmation text was '${{ github.event.inputs.confirm }}' — must be exactly 'RESET'"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch DATABASE_URL from Key Vault
        id: kv
        run: |
          DB_URL=$(az keyvault secret show \
            --vault-name ${{ secrets.KEY_VAULT_NAME }} \
            --name "DATABASE-URL" \
            --query value -o tsv)
          echo "::add-mask::${DB_URL}"
          echo "database-url=${DB_URL}" >> "$GITHUB_OUTPUT"

      - name: Drop all constraints and tables
        working-directory: backend
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database-url }}
        run: |
          echo "⚠️  Dropping all database objects..."
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Actor:  ${{ github.actor }}"
          npx ts-node --transpile-only scripts/db-nuke.ts

      - name: Recreate schema
        working-directory: backend
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database-url }}
        run: |
          npx prisma db push --accept-data-loss
          echo "✅ Schema applied to fresh database"

      - name: Seed database
        working-directory: backend
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database-url }}
        run: |
          echo "🌱 Seeding database..."
          npx prisma db seed
          echo "✅ Seed complete"

      - name: Summary
        run: |
          echo "## ✅ Database Reset Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field   | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor**  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Demo credentials:" >> $GITHUB_STEP_SUMMARY
          echo "- Login: \`admin@demo.aerocomm.io\`" >> $GITHUB_STEP_SUMMARY
          echo "- Password: \`ChangeMe123!\`" >> $GITHUB_STEP_SUMMARY
