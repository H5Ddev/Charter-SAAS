# ─────────────────────────────────────────────────────────────────────────────
# AeroComm — Database Reset Workflow (DESTRUCTIVE)
# .github/workflows/db-reset.yml
#
# ⚠️  WARNING: This drops ALL tables and reseeds from scratch.
#     ALL production data will be permanently deleted.
#
# Triggered by: Manual workflow_dispatch ONLY
# Requires:     Typing "RESET" in the confirmation field
# Secrets required: DATABASE_URL
# ─────────────────────────────────────────────────────────────────────────────

name: "⚠️ Database Reset (DESTRUCTIVE)"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET to confirm — this deletes ALL data permanently'
        required: true
        type: string
      reason:
        description: 'Why are you resetting the database?'
        required: true
        type: string

jobs:
  reset-database:
    name: Drop & Recreate Database
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Abort if confirmation missing
        if: github.event.inputs.confirm != 'RESET'
        run: |
          echo "❌ Confirmation text was '${{ github.event.inputs.confirm }}' — must be exactly 'RESET'"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Reset schema and reseed
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "⚠️  Resetting database..."
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Actor:  ${{ github.actor }}"
          npx prisma migrate reset --force
          echo "✅ Reset and seed complete"

      - name: Summary
        run: |
          echo "## ✅ Database Reset Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field   | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor**  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Demo credentials:" >> $GITHUB_STEP_SUMMARY
          echo "- Login: \`admin@demo.aerocomm.io\`" >> $GITHUB_STEP_SUMMARY
          echo "- Password: \`ChangeMe123!\`" >> $GITHUB_STEP_SUMMARY
