# ─────────────────────────────────────────────────────────────────────────────
# AeroComm — Re-seed Database (non-destructive)
# .github/workflows/db-seed.yml
#
# Runs `prisma db seed` against the database without touching schema or data.
# All seed operations use upsert — safe to run at any time.
#
# Triggered by: Manual workflow_dispatch ONLY
# Secrets required: DATABASE_URL
# ─────────────────────────────────────────────────────────────────────────────

name: "🌱 Re-seed Database (non-destructive)"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you re-seeding? (e.g. fix automation triggers)'
        required: false
        type: string

jobs:
  seed-database:
    name: Run Prisma Seed
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Seed database
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🌱 Running seed (upsert — non-destructive)..."
          echo "Reason: ${{ github.event.inputs.reason || 'not specified' }}"
          echo "Actor:  ${{ github.actor }}"
          npx prisma db seed
          echo "✅ Seed complete"

      - name: Summary
        run: |
          echo "## ✅ Database Re-seed Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field   | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor**  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | ${{ github.event.inputs.reason || 'not specified' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
