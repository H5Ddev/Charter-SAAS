version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: 'postgresql://aerocomm:aerocomm@db:5432/aerocomm_dev'
      JWT_ACCESS_SECRET: 'dev-access-secret-change-in-prod'
      JWT_REFRESH_SECRET: 'dev-refresh-secret-change-in-prod'
      JWT_ACCESS_EXPIRES_IN: '15m'
      JWT_REFRESH_EXPIRES_IN: '7d'
      AUTOMATION_QUEUE: automation-events
      NOTIFICATION_QUEUE: notification-events
      AZURE_STORAGE_CONNECTION_STRING: 'DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tiqIRQcFQsAXLJQ==;BlobEndpoint=http://azurite:10000/devstoreaccount1;'
      AZURE_STORAGE_CONTAINER_DOCUMENTS: documents
      AZURE_STORAGE_CONTAINER_PHOTOS: photos
      TOTP_APP_NAME: AeroComm
      TOTP_ISSUER: AeroComm
      CORS_ORIGINS: 'http://localhost:5173,http://localhost:3000'
      LOG_LEVEL: debug
      PORT: '3000'
      API_BASE_URL: 'http://localhost:3000'
      FRONTEND_URL: 'http://localhost:5173'
      RATE_LIMIT_WINDOW_MS: '900000'
      RATE_LIMIT_MAX: '1000'
    command: npx ts-node-dev --respawn --transpile-only src/server.ts
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      azurite:
        condition: service_started
    networks:
      - aerocomm

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: 'http://localhost:3000'
      VITE_TENANT_ID: 'tenant_aerocomm_demo'
      API_TARGET: 'http://backend:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - aerocomm

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: aerocomm
      POSTGRES_PASSWORD: aerocomm
      POSTGRES_DB: aerocomm_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aerocomm -d aerocomm_dev']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aerocomm

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - '10000:10000'
      - '10001:10001'
      - '10002:10002'
    volumes:
      - azurite_data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --debug /data/debug.log
    networks:
      - aerocomm

volumes:
  pg_data:
  azurite_data:

networks:
  aerocomm:
    driver: bridge
