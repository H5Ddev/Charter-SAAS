server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;

    # Cache static assets — Vite emits content-hashed filenames, so these are
    # safe to cache forever. A new deploy produces new hashed URLs.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache HTML. index.html references hashed asset URLs that change on
    # every deploy; a cached index.html pointing at deleted chunks is what
    # caused the "flash login then blank" outage. Must re-declare the server-
    # level security headers here because nginx's add_header inheritance stops
    # at any location block that sets its own add_header.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # SPA fallback: serve index.html for all unmatched routes.
    # The internal redirect to /index.html re-matches locations, so the
    # \.html$ block above applies to SPA route loads.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Server-level security headers — apply to responses from locations that
    # don't set their own add_header (primarily: the static-asset block and
    # the SPA fallback when no file exists).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
